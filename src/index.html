<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="mode-selection-screen" class="quiz-container" style="display: flex;">
    <h2>Chọn Chế Độ</h2>
    <div id="mode-buttons">
      <button class="mode-btn" data-mode="quiz">Chế Độ Quiz</button>
      <button class="mode-btn" data-mode="flashcard">Chế Độ Flashcard</button>
      <button id="weak-review-btn">Ôn Điểm Yếu</button>
    </div>
    <button id="view-progress-btn">Xem Tiến Trình</button>
    <button id="pt-btn">Luyện Phát Âm</button>
  </div>
  <div id="progress-screen" class="quiz-container" style="display: none;">
    <h2>Tiến Trình Học</h2>
    <div id="progress-content"></div>
    <div id="progress-actions">
      <button id="reset-weak-items-btn">Xóa Mục Yếu</button>
      <button id="reset-progress-btn">Xóa Tiến Trình</button>
      <button id="back-from-progress-btn">Quay Lại</button>
    </div>
  </div>
  <div id="quiztype-screen" class="quiz-container" style="display: none;">
    <h2>Chọn Loại Quiz</h2>
    <div id="quiztype-buttons">
      <button class="quiztype-btn" data-quiztype="hiragana">Hiragana</button>
      <button class="quiztype-btn" data-quiztype="katakana">Katakana</button>
      <button class="quiztype-btn" data-quiztype="kanji">Kanji</button>
      <button id="mixed-btn">Hỗn Hợp</button>
    </div>
    <button id="back-from-quiztype-btn" class="back-btn">Quay Lại</button>
  </div>
  <div id="mix-type-screen" class="quiz-container" style="display: none;">
    <h2>Chọn Loại Kết Hợp</h2>
    <p class="mix-type-hint">Chọn ít nhất 2 loại</p>
    <div class="mix-type-options">
      <label><input type="checkbox" value="hiragana"> Hiragana</label>
      <label><input type="checkbox" value="katakana"> Katakana</label>
      <label><input type="checkbox" value="kanji"> Kanji</label>
    </div>
    <button id="start-mixed-btn" disabled>Bắt Đầu</button>
    <button id="back-from-mix-type-btn" class="back-btn">← Quay Lại</button>
  </div>
  <!-- Pronunciation Trainer screens -->
  <div id="pt-type-screen" class="quiz-container" style="display: none;">
    <h2>Luyện Phát Âm</h2>
    <p class="pt-subtitle">Chọn bảng chữ để bắt đầu</p>
    <div class="pt-type-options">
      <button class="pt-type-btn" data-type="hiragana">Hiragana<span class="pt-type-sub">あいうえお</span></button>
      <button class="pt-type-btn" data-type="katakana">Katakana<span class="pt-type-sub">アイウエオ</span></button>
    </div>
    <button id="back-from-pt-type-btn" class="back-btn">← Quay Lại</button>
  </div>
  <div id="pt-lesson-screen" class="quiz-container" style="display: none;">
    <h2 id="pt-lesson-title">Chọn Bài</h2>
    <p class="pt-subtitle">Mỗi bài gồm 5 ký tự · Học → Luyện → Ôn</p>
    <div id="pt-lesson-buttons"></div>
    <button id="back-from-pt-lesson-btn" class="back-btn">← Quay Lại</button>
  </div>
  <div id="pt-screen" class="quiz-container" style="display: none;">
    <div id="pt-phase-label"></div>
    <div id="pt-progress"></div>
    <div id="pt-card-section">
      <div id="pt-character"></div>
      <div id="pt-reading" style="display: none;"></div>
    </div>
    <div id="pt-choose-section" style="display: none;">
      <div id="pt-listen-indicator">🔊</div>
      <div id="pt-choice-options"></div>
    </div>
    <div id="pt-actions">
      <button id="pt-speak-btn" style="display: none;">▶ Nghe lại</button>
      <button id="pt-reveal-btn" style="display: none;">Nghe &amp; Xem đáp án</button>
      <button id="pt-knew-btn" style="display: none;">Biết rồi ✓</button>
      <button id="pt-unsure-btn" style="display: none;">Chưa chắc ?</button>
      <button id="pt-next-btn" style="display: none;">Tiếp →</button>
    </div>
    <button id="pt-exit-btn" class="back-btn">← Thoát</button>
  </div>
  <div id="pt-summary-screen" class="quiz-container" style="display: none;">
    <h2 id="pt-summary-title">Kết Quả</h2>
    <div id="pt-summary-content"></div>
    <div id="pt-summary-actions">
      <button id="pt-retry-btn" style="display: none;">Ôn lại →</button>
      <button id="pt-next-lesson-btn">Chọn bài khác</button>
      <button id="pt-pt-home-btn">Về Trang Chủ</button>
    </div>
  </div>
  <!-- End Pronunciation Trainer screens -->
  <div id="difficulty-screen" class="quiz-container" style="display: none;">
    <h2>Chọn Độ Khó</h2>
    <div id="difficulty-buttons">
      <button class="difficulty-btn" data-difficulty="easy">Dễ</button>
      <button class="difficulty-btn" data-difficulty="medium">Trung Bình</button>
      <button class="difficulty-btn" data-difficulty="hard">Khó</button>
    </div>
    <button id="back-from-difficulty-btn" class="back-btn">Quay Lại</button>
  </div>
  <div id="group-filter-screen" class="quiz-container" style="display: none;">
    <h2>Chọn Nhóm</h2>
    <div id="group-buttons"></div>
    <div class="button-row">
      <button id="back-to-difficulty-btn">Quay Lại</button>
      <button id="confirm-group-btn">Tiếp Theo</button>
    </div>
  </div>
  <div id="settings-screen" class="quiz-container" style="display: none;">
    <h2>Cài Đặt Quiz</h2>
    <div class="setting-group">
      <p>Tự động chuyển câu</p>
      <div class="setting-options">
        <button class="setting-btn active" data-setting="autoAdvance" data-value="true">Bật</button>
        <button class="setting-btn" data-setting="autoAdvance" data-value="false">Tắt</button>
      </div>
    </div>
    <div class="setting-group">
      <p>Độ trễ phản hồi</p>
      <div class="setting-options">
        <button class="setting-btn" data-setting="feedbackDelay" data-value="500">500ms</button>
        <button class="setting-btn active" data-setting="feedbackDelay" data-value="800">800ms</button>
        <button class="setting-btn" data-setting="feedbackDelay" data-value="1200">1200ms</button>
      </div>
    </div>
    <div class="setting-group">
      <p>Ôn lỗi sau quiz</p>
      <div class="setting-options">
        <button class="setting-btn active" data-setting="reviewEnabled" data-value="true">Bật</button>
        <button class="setting-btn" data-setting="reviewEnabled" data-value="false">Tắt</button>
      </div>
    </div>
    <div class="button-row">
      <button id="back-to-group-btn">Quay Lại</button>
      <button id="start-quiz-btn">Bắt Đầu Quiz</button>
    </div>
  </div>
  <div class="quiz-container" id="main-quiz" style="display: none;">
    <div id="progress-bar-container">
      <div id="progress-bar"></div>
      <span id="question-counter"></span>
    </div>
    <div id="question-area">
      <span id="hiragana-char"></span>
    </div>
    <div id="options-area">
      <!-- Answer buttons will be rendered here -->
    </div>
    <div class="info-bar">
      <span id="score">Điểm: 0</span>
    </div>
    <div class="button-row">
      <button id="skip-btn">Bỏ Qua</button>
      <button id="restart-btn">Làm Lại</button>
      <button id="next-btn" style="display:none;">Tiếp</button>
      <button id="review-btn" style="display:none;">Ôn Câu Sai</button>
      <button id="review-all-btn" style="display:none;">Xem Lại Tất Cả</button>
    </div>
    <div id="review-area" style="display:none;"></div>
  </div>
  <div id="flashcard-screen" class="quiz-container" style="display: none;">
    <div id="fc-progress"></div>
    <div id="fc-card">
      <div id="fc-character"></div>
      <div id="fc-answer" style="display:none;"></div>
    </div>
    <div id="fc-buttons">
      <button id="fc-show-btn">Hiện Đáp Án</button>
      <button id="fc-knew-btn" style="display:none;">Tôi biết rồi</button>
      <button id="fc-review-btn" style="display:none;">Cần ôn lại</button>
    </div>
    <button id="fc-restart-btn">Làm Lại</button>
  </div>
  <script src="hiraganaData.js"></script>
  <script src="progress.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
